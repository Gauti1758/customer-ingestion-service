version: "3.9"

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       customer_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Flask Mock Server ─────────────────────────────────────────────────────
  mock-server:
    build: ./mock-server
    container_name: mock-server
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── FastAPI Pipeline ──────────────────────────────────────────────────────
  pipeline-service:
    build: ./pipeline-service
    container_name: pipeline-service
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mock-server:
        condition: service_healthy
    environment:
      DATABASE_URL:   postgresql://postgres:password@postgres:5432/customer_db
      FLASK_BASE_URL: http://mock-server:5000

volumes:
  pg_data:
